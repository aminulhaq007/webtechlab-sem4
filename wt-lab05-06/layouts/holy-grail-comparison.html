<!DOCTYPE html>
<html>
<head>
<title>Holy Grail Layout</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/grid.css">

<style>
.container {
display: grid;
grid-template-areas:
"header header header"
"nav main aside"
"footer footer footer";

grid-template-columns: 200px 1fr 200px;
gap: 10px;
}

header {
grid-area: header;
background: #444;
color: white;
padding: 20px;
}

nav {
grid-area: nav;
background: #ddd;
padding: 20px;
}

main {
grid-area: main;
background: #eee;
padding: 20px;
}

aside {
grid-area: aside;
background: #ccc;
padding: 20px;
}

footer {
grid-area: footer;
background: #444;
color: white;
padding: 20px;
}
</style>

</head>

<body>

<div class="container">

<header>Header</header>

<nav>
Menu<br>
Home<br>
About<br>
Contact
</nav>

<main>
Main Content Area
</main>

<aside>
Sidebar
</aside>

<footer>
Footer
</footer>

</div>

</body>
</html>
