<!DOCTYPE html>
<html>
<head>
<title>Portfolio Layout</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/flexbox.css">
<link rel="stylesheet" href="../styles/grid.css">

<style>
header {
    background: #333;
    color: white;
    padding: 20px;
    text-align: center;
}

.nav {
    display: flex;
    background: #555;
    justify-content: center;
}

.nav a {
    color: white;
    padding: 15px;
    text-decoration: none;
}

.footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<header>
<h1>My Portfolio</h1>
</header>

<div class="nav">
<a href="#">Home</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</div>

<div class="grid">

<div class="box">Project 1</div>
<div class="box">Project 2</div>
<div class="box">Project 3</div>

</div>

<div class="footer">
Portfolio Footer
</div>

</body>
</html>
