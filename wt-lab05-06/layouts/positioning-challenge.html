<!DOCTYPE html>
<html>
<head>
<title>Positioning Challenge</title>

<style>

.container{
position:relative;
width:400px;
height:300px;
border:2px solid black;
}

.box1{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:20px;
}

.box2{
position:absolute;
bottom:10px;
right:10px;
background:blue;
color:white;
padding:20px;
}

.box3{
position:absolute;
top:120px;
left:150px;
background:green;
color:white;
padding:20px;
}

</style>

</head>

<body>

<h2>Positioning Layout</h2>

<div class="container">

<div class="box1">Top Left</div>
<div class="box2">Bottom Right</div>
<div class="box3">Center Box</div>

</div>

</body>
</html>
