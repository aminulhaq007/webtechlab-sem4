<!DOCTYPE html>
<html>
<head>
<title>Display Properties</title>

<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/display.css">

</head>

<body>

<h2>Block Elements</h2>
<div class="block blue">Block 1</div>
<div class="block green">Block 2</div>

<h2>Inline Elements</h2>
<span class="inline yellow">Inline 1</span>
<span class="inline orange">Inline 2</span>

<h2>Inline Block</h2>
<div class="inline-block box1">Box1</div>
<div class="inline-block box2">Box2</div>

<h2>Hidden Elements</h2>
<p class="hidden-visibility">Hidden using visibility</p>
<p class="hidden-display">Hidden using display none</p>

</body>
</html>
