<!DOCTYPE html>
<html>
<head>

<title>Navigation Display Example</title>

<style>

ul{
list-style:none;
padding:0;
margin:0;
background:#333;
}

li{
display:inline-block;
}

li a{
color:white;
text-decoration:none;
padding:12px 20px;
display:block;
}

li a:hover{
background:#555;
}

</style>

</head>

<body>

<h1>Horizontal Navigation Menu</h1>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>

</ul>

</body>
</html>
