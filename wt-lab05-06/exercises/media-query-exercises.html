<!DOCTYPE html>

<head>
<title>Media Query Exercise</title>

<style>

body{
font-family:Arial;
background:lightblue;
text-align:center;
padding:40px;
}


@media (max-width:768px){

body{
background:lightgreen;
}

}

</style>

</head>

<body>

<h1>Media Query Example</h1>

<p>
Resize the browser window.  
When the screen width becomes smaller than 768px, the background color changes.
</p>

</body>
</html>
