<!DOCTYPE html>
<html>

<head>

<title>Selectors Exercise</title>

<link rel="stylesheet" href="../styles/main.css">

<style>

/* element selector */

p{

color:blue;

}

/* class selector */

.highlight{

background-color:yellow;

}

/* id selector */

#mainTitle{

color:red;

}

/* universal selector */

*{

font-family:Arial;

}

/* attribute selector */

input[type="text"]{

border:2px solid black;

}

/* pseudo class */

a:hover{

color:green;

}

/* pseudo element */

p::first-letter{

font-size:26px;

color:red;

}

</style>

</head>

<body>

<h1 id="mainTitle">CSS Selectors Example</h1>

<p>This is a normal paragraph.</p>

<p class="highlight">This paragraph uses class selector.</p>

<input type="text" placeholder="Enter name">

<br><br>

<a href="#">Hover over this link</a>

</body>

</html>
