<!DOCTYPE html>
<html>

<head>

<title>CSS Transform Examples</title>

<link rel="stylesheet" href="../styles/main.css">
<link rel="stylesheet" href="../styles/effects.css">

<style>

.box{
width:120px;
height:120px;
background-color:skyblue;
margin:20px;
display:inline-block;
text-align:center;
line-height:120px;
font-weight:bold;
transition:0.5s;
}

.rotate:hover{
transform:rotate(45deg);
}

.scale:hover{
transform:scale(1.3);
}

.translate:hover{
transform:translate(30px,20px);
}

.skew:hover{
transform:skew(20deg);
}

</style>

</head>

<body>

<h1>CSS Transform Examples</h1>

<div class="box rotate">Rotate</div>
<div class="box scale">Scale</div>
<div class="box translate">Move</div>
<div class="box skew">Skew</div>

</body>
</html>
