<!DOCTYPE html>
<html>

<head>

<title>CSS Effects</title>

<link rel="stylesheet" href="../styles/effects.css">

<style>

.effect-box{
width:150px;
height:150px;
background:orange;
margin:20px;
display:inline-block;
transition:0.4s;
}

.effect-box:hover{
box-shadow:0 6px 12px rgba(0,0,0,0.4);
transform:scale(1.1);
}

.link{
text-decoration:none;
color:black;
font-size:20px;
}

.link:hover{
color:red;
text-decoration:underline;
}

</style>

</head>

<body>

<h1>Hover Effects</h1>

<div class="effect-box"></div>
<div class="effect-box"></div>

<br><br>

<a href="#" class="link">Hover this link</a>

</body>
</html>
