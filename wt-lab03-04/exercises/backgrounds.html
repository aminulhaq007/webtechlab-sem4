<!DOCTYPE html>
<html>

<head>

<title>Background Styling</title>

<style>

.box{

height:200px;

margin:20px;

color:rgb(44, 41, 41);

padding:20px;

}

.color{

background-color:teal;

}

.image{

background-image:url("../images/backgrounds/samurai-7680x4320.jpg");


background-size:cover;

}

.linear{

background:linear-gradient(to right, red, yellow);

}

.radial{

background:radial-gradient(circle, rgb(59, 59, 214), black);

}

</style>

</head>

<body>

<div class="box color">Solid Color Background</div>

<div class="box image">Image Background</div>

<div class="box linear">Linear Gradient</div>

<div class="box radial">Radial Gradient</div>

</body>

</html>
