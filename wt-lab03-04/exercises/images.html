<!DOCTYPE html>
<html>

<head>

<title>Image Styling Portfolio</title>

<link rel="stylesheet" href="../styles/main.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/effects.css">

<style>

.gallery{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.image-card{
position:relative;
width: 440px;
overflow:hidden;
}

.image-card img{
width:100%;
border-radius:12px;
border:3px solid #333;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
transition:0.4s;
}

.image-card img:hover{
filter:brightness(120%) contrast(110%);
transform:scale(1.05);
}

.overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
padding:13px;
opacity:0;
transition:0.4s;
}

.image-card:hover .overlay{
opacity:1;
}

</style>

</head>

<body>

<h1>Image Styling Gallery</h1>

<div class="gallery">

<div class="image-card">

<img src="../images/backgrounds/gallery/img1.jpeg">

<div class="overlay">Nature Image</div>

</div>

<div class="image-card">

<img src="../images/backgrounds/gallery/img2.jpg">

<div class="overlay">Landscape</div>

</div>

<div class="image-card">

<img src="../images/backgrounds/gallery/img3.jpg">

<div class="overlay">Mountains</div>

</div>

</div>

</body>
</html>
